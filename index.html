<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <!-- viewport-fit=cover: env(safe-area-inset-*) applies on notched devices / PWAs. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- Native controls + scrollbars follow light/dark before JS; avoids wrong scheme on form controls. -->
    <meta name="color-scheme" content="light dark" />
    <!-- PWA / iOS status bar: match canvas/header tones (see index.css --background light / .dark). -->
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#14151a"
      media="(prefers-color-scheme: dark)"
    />
    <title>Hiro Task Manager</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("tm-preferences");
          var dark = false;
          if (raw) {
            var p = JSON.parse(raw);
            var th = p.state && p.state.themePreference;
            if (th === "dark") dark = true;
            else if (th === "light") dark = false;
            else {
              dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            }
          } else {
            dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          }
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
